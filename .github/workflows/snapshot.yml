name: Snapshot

# Hourly PRECOMPUTE for the POSX Control Tower. A full snapshot takes ~285s live,
# too slow for a Vercel function (60s ceiling). We compute it here and publish the
# JSON as assets on the machine-managed GitHub Release `snapshot-latest`; the
# force-dynamic Next.js app reads those public asset URLs server-side on the next
# request. Nothing is committed to git and nothing is pushed to protected master,
# so the workflow's built-in GITHUB_TOKEN is all that is needed — no PAT, no bypass,
# no external storage.
#
# latest.json is overwritten every run, so the live dashboard is at most ~1h stale.
# The per-day history file (snapshot-<UTCdate>.json), which day-over-day RED delta
# and the trend chart depend on, is frozen on the FIRST run of each UTC day by
# write_snapshot() in scripts/snapshot.py — later runs that day leave it alone. The
# seed step below downloads BOTH the most recent prior-day file (for the delta) and
# today's own file if it already exists (so the freeze check has something to see).
#
# SETUP REQUIRED (one time): a single repository secret:
#   YT_TOKEN — a YouTrack permanent token. LEAST-PRIVILEGE, READ-ONLY service
#   account (the snapshot only READS: effort/worklog/hygiene). Never an admin token.
#   Settings -> Secrets and variables -> Actions -> New repository secret.
# Optionally set YT_BASE (defaults to https://support.posibolt.com in the engine).

on:
  schedule:
    - cron: "0 * * * *"      # hourly, on the hour (UTC)
  workflow_dispatch:
    inputs:
      project:
        description: "Project short name"
        required: false
        default: "PXB1"
      scope:
        description: "Scope (e.g. PHASE 1)"
        required: false
        default: "PHASE 1"
      sprint:
        description: "Sprint override for timespent (blank = latest active)"
        required: false
        default: ""

# Publishing to a Release needs contents:write; no branch is pushed.
permissions:
  contents: write

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: snapshot-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Seed prior snapshot (for day-over-day deltas)
        run: |
          mkdir -p web/data
          # Each run is a fresh checkout with no persisted local state, so two
          # things need seeding from the release before scripts/snapshot.py runs:
          #   1. The most recent PRIOR dated snapshot, so build_insights() can
          #      diff against it for the day-over-day RED delta.
          #   2. TODAY's own dated snapshot, if an earlier run today already
          #      published one — otherwise write_snapshot()'s freeze check
          #      (`if not os.path.exists(dated)`) would never see it locally and
          #      would re-freeze on every hourly run instead of only the first.
          # (_prior_snapshot_red() in scripts/snapshot.py explicitly excludes
          # today's own date from the delta comparison, so seeding both here
          # can never make it diff a snapshot against itself.)
          TODAY="snapshot-$(date -u +%Y-%m-%d).json"
          gh release download "$TAG" --pattern "$TODAY" --dir web/data --clobber 2>/dev/null \
            && echo "seeded today's own $TODAY (later runs today will not re-freeze it)" \
            || true
          if gh release download "$TAG" --pattern "index.json" --dir /tmp/idx --clobber 2>/dev/null; then
            PRIOR=$(python3 -c "import json; a=json.load(open('/tmp/idx/index.json')); print(a[-1] if a else '')")
            if [ -n "$PRIOR" ]; then
              gh release download "$TAG" --pattern "$PRIOR" --dir web/data --clobber 2>/dev/null || true
              echo "seeded prior $PRIOR"
            fi
          else
            echo "no release yet — first run; deltas begin next run"
          fi

      - name: Produce snapshot
        # Dispatch inputs are routed through env (never interpolated into the shell)
        # so an untrusted value can't inject a command. Defaults apply on the hourly
        # schedule where inputs are empty.
        env:
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
          YT_BASE: ${{ secrets.YT_BASE }}   # optional; engine defaults if unset
          IN_PROJECT: ${{ github.event.inputs.project }}
          IN_SCOPE: ${{ github.event.inputs.scope }}
          IN_SPRINT: ${{ github.event.inputs.sprint }}
        run: |
          if [ -z "${YT_TOKEN}" ]; then
            echo "::error::YT_TOKEN secret is not set. Add a read-only YouTrack token as the YT_TOKEN Actions secret."
            exit 1
          fi
          PROJECT="${IN_PROJECT:-PXB1}"
          SCOPE="${IN_SCOPE:-PHASE 1}"
          if [ -n "${IN_SPRINT}" ]; then
            python3 scripts/snapshot.py --project "$PROJECT" --scope "$SCOPE" --sprint "$IN_SPRINT"
          else
            python3 scripts/snapshot.py --project "$PROJECT" --scope "$SCOPE"
          fi

      - name: Publish snapshot to the release
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "POSX Control Tower data (machine-managed)" \
              --notes "Snapshot assets for the Control Tower dashboard, refreshed hourly. Auto-updated by the Snapshot workflow — do not edit." \
              --latest=false
          # index.json = every dated snapshot (existing release assets ∪ new local ones).
          python3 - <<'PY'
          import json, glob, os, subprocess
          existing = []
          try:
              out = subprocess.check_output(
                  ["gh", "release", "view", os.environ["TAG"], "--json", "assets", "-q", ".assets[].name"],
                  text=True)
              existing = [n.strip() for n in out.splitlines()
                          if n.strip().startswith("snapshot-") and n.strip().endswith(".json")]
          except Exception:
              pass
          local = [os.path.basename(p) for p in glob.glob("web/data/snapshot-*.json")]
          names = sorted(set(existing) | set(local))
          json.dump(names, open("web/data/index.json", "w"))
          print("index.json:", names)
          PY
          gh release upload "$TAG" web/data/latest.json web/data/index.json web/data/snapshot-*.json --clobber
