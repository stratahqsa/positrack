name: Snapshot

# Nightly PRECOMPUTE for the POSX Control Tower. A full snapshot takes ~285s live,
# which cannot run inside a Vercel function (60s ceiling). We compute it here and
# UPLOAD the JSON to Vercel Blob; the force-dynamic Next.js app reads it from Blob
# server-side on the next request. No data is committed to git and nothing is
# pushed to the (protected) master branch — so no push token / bypass is needed.
#
# SETUP REQUIRED (one time), two repository secrets:
#   1. YT_TOKEN — a YouTrack permanent token. LEAST-PRIVILEGE, READ-ONLY service
#      account (the snapshot only READS: effort/worklog/hygiene). Never an admin token.
#   2. BLOB_READ_WRITE_TOKEN — from the Vercel Blob store connected to the Control
#      Tower project (Vercel -> Storage -> the Blob store -> read/write token; the
#      same token Vercel injects into the app's env so it can READ the snapshot).
#   Add both at: Settings -> Secrets and variables -> Actions -> New repository secret.
# Optionally set YT_BASE (defaults to https://support.posibolt.com in the engine).

on:
  schedule:
    - cron: "0 2 * * *"      # 02:00 UTC nightly
  workflow_dispatch:
    inputs:
      project:
        description: "Project short name"
        required: false
        default: "PXB1"
      scope:
        description: "Scope (e.g. PHASE 1)"
        required: false
        default: "PHASE 1"
      sprint:
        description: "Sprint override for timespent (blank = latest active)"
        required: false
        default: ""

# The snapshot goes to Vercel Blob, not git — no repo write access needed.
permissions:
  contents: read

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Blob uploader deps
        run: npm --prefix scripts/blob ci

      - name: Seed prior snapshot (for day-over-day deltas)
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          if [ -z "${BLOB_READ_WRITE_TOKEN}" ]; then
            echo "::error::BLOB_READ_WRITE_TOKEN secret is not set (see workflow header)."
            exit 1
          fi
          mkdir -p web/data
          node scripts/blob/sync.mjs pull

      - name: Produce snapshot
        # Dispatch inputs are routed through env (never interpolated into the shell)
        # so an untrusted value can't inject a command. Defaults apply on the nightly
        # schedule where inputs are empty.
        env:
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
          YT_BASE: ${{ secrets.YT_BASE }}   # optional; engine defaults if unset
          IN_PROJECT: ${{ github.event.inputs.project }}
          IN_SCOPE: ${{ github.event.inputs.scope }}
          IN_SPRINT: ${{ github.event.inputs.sprint }}
        run: |
          if [ -z "${YT_TOKEN}" ]; then
            echo "::error::YT_TOKEN secret is not set. Add a read-only YouTrack token as the YT_TOKEN Actions secret."
            exit 1
          fi
          PROJECT="${IN_PROJECT:-PXB1}"
          SCOPE="${IN_SCOPE:-PHASE 1}"
          if [ -n "${IN_SPRINT}" ]; then
            python3 scripts/snapshot.py --project "$PROJECT" --scope "$SCOPE" --sprint "$IN_SPRINT"
          else
            python3 scripts/snapshot.py --project "$PROJECT" --scope "$SCOPE"
          fi

      - name: Upload snapshot to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node scripts/blob/sync.mjs push
