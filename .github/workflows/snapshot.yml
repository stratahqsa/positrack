name: Snapshot

# 5x/day (5am/8am/12pm/4pm/7pm IST) PRECOMPUTE for the POSX Reports dashboard. A full
# snapshot takes ~285s live, too slow for a Vercel function (60s ceiling). We
# compute it here and publish the JSON to Vercel Blob under a SECRET path
# prefix; the force-dynamic Next.js app reads it server-side on the next
# request. Nothing is committed to git and nothing is pushed to master.
#
# CADENCE: moved off hourly (2026-07-17), then from 3x/day to 4x/day
# (2026-07-17, added the 4pm run) — team reported the hourly sweep noticeably
# slowing down the shared YouTrack instance's own frontend for concurrent
# users. A 5am run was added on top of the existing 8am run (2026-07-20) for
# 5x/day total. The dashboard can be up to ~10h stale overnight (between the
# 7pm and 5am runs) instead of ~1h under the old hourly schedule, which was
# judged an acceptable trade for YouTrack headroom.
#
# PRIVACY / LOCKDOWN: the snapshot's raw fields (assignee / people names) are
# not exposed at a guessable public URL. It is published ONLY to Vercel Blob
# under an unguessable "<SNAPSHOT_SECRET>/..." prefix — NOT to a public GitHub
# Release (the old web/ Control Tower that read the Release has been retired).
# This is a secret-path interim, not private ACLs (the existing Blob store is
# public and its access mode is immutable once created), so a leaked URL stays
# valid; the proper follow-up is a private Blob store read via the SDK. The
# dashboard points SNAPSHOT_DATA_URL at <blob-base>/<SNAPSHOT_SECRET>.
#
# latest.json is overwritten every run (see CADENCE above for staleness). The
# per-day history file snapshot-<UTCdate>.json (which the day-over-day RED
# delta depends on) is frozen on the FIRST run of each UTC day by
# write_snapshot() in scripts/snapshot.py; scripts/blob_seed.mjs pulls the most
# recent prior-day file (and today's own, if any) back from Blob before
# snapshot.py runs.
#
# SETUP REQUIRED (repository secrets):
#   YT_TOKEN               read-only YouTrack token (the snapshot only READS).
#   BLOB_READ_WRITE_TOKEN  Vercel Blob store read/write token.
#   SNAPSHOT_SECRET        long random string used as the Blob path prefix; the
#                          dashboard's SNAPSHOT_DATA_URL must end with it.
# Optionally YT_BASE (defaults to https://support.posibolt.com in the engine).
#
# AI BRIEFING (optional, additive): the "Generate AI briefing" step runs
# scripts/ai_brief.mjs, distilling the fresh snapshot into a short 3-part exec
# brief via one OpenAI-compatible chat-completion call and baking it into
# latest.json as `ai_brief` BEFORE the publish step. Fail-soft: with no
# AI_API_KEY set it logs a warning and skips, leaving latest.json untouched.
# Enable via AI_API_KEY + AI_BASE_URL + AI_MODEL (see .env.example). What may
# egress to the LLM (AI_SEND_REAL_NAMES / AI_SEND_SUMMARIES, default unset) is
# a privacy-posture call for whoever adds the secret.

on:
  schedule:
    # FALLBACK ONLY (5am IST): punctual runs come from Vercel Cron → the
    # dashboard's /api/cron/refresh route → workflow_dispatch, on the schedule
    # managed in the dashboard's /admin panel. GitHub `schedule` triggers drift
    # 1-3.5h (measured Jul 2026 over 10 runs), which is why the 5-slot cron
    # that used to live here moved to Vercel. This nightly net means data can
    # never go >24h stale even if the Vercel side breaks; the `gate` job below
    # makes it respect the same admin config (pause/days/enabled).
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      project:
        description: "Project short name"
        required: false
        default: "PXB1"
      scope:
        description: "Scope (e.g. PHASE 1)"
        required: false
        default: "PHASE 1"
      sprint:
        description: "Sprint override for timespent (blank = latest active)"
        required: false
        default: ""

# No GitHub Release is published anymore (snapshot goes only to Vercel Blob);
# checkout needs read only, and no branch is pushed.
permissions:
  contents: read

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Fallback-schedule gate: `schedule:` runs consult the admin-managed
  # schedule.json (pause / days-off / disabled) before doing anything;
  # workflow_dispatch runs (manual UI, dashboard Refresh Now, Vercel Cron
  # slots) always pass — the Vercel route already applied the config, and
  # explicit human intent must never be gated. Fail-open: see schedule_gate.mjs.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - uses: actions/checkout@v7
      - name: Schedule gate (fallback runs respect the admin config)
        id: gate
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          SNAPSHOT_SECRET: ${{ secrets.SNAPSHOT_SECRET }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "gate: run=true — workflow_dispatch always runs"
          else
            npm install --no-save @vercel/blob@1
            node scripts/schedule_gate.mjs
          fi

  snapshot:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Seed prior snapshot from Blob (for day-over-day deltas)
        # Best-effort: pulls the most recent prior-day dated file (the delta
        # baseline) and today's own dated file if an earlier run today already
        # published one (so write_snapshot()'s freeze check sees it), from the
        # secret Blob prefix, before scripts/snapshot.py runs. continue-on-error
        # so a transient npm/list hiccup can never break the snapshot itself;
        # the seed is not a dependency of producing the snapshot, only of the
        # RED delta. See scripts/blob_seed.mjs.
        continue-on-error: true
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          SNAPSHOT_SECRET: ${{ secrets.SNAPSHOT_SECRET }}
        run: |
          npm install --no-save @vercel/blob@1
          node scripts/blob_seed.mjs

      - name: Produce snapshot
        # Dispatch inputs are routed through env (never interpolated into the shell)
        # so an untrusted value can't inject a command. Defaults apply on the
        # scheduled runs where inputs are empty.
        env:
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
          YT_BASE: ${{ secrets.YT_BASE }}   # optional; engine defaults if unset
          YT_THROTTLE_MS: "150"             # pace the ~50 remaining calls — never burst YouTrack
          IN_PROJECT: ${{ github.event.inputs.project }}
          IN_SCOPE: ${{ github.event.inputs.scope }}
          IN_SPRINT: ${{ github.event.inputs.sprint }}
        run: |
          if [ -z "${YT_TOKEN}" ]; then
            echo "::error::YT_TOKEN secret is not set. Add a read-only YouTrack token as the YT_TOKEN Actions secret."
            exit 1
          fi
          PROJECT="${IN_PROJECT:-PXB1}"
          SCOPE="${IN_SCOPE:-PHASE 1}"
          if [ -n "${IN_SPRINT}" ]; then
            python3 scripts/snapshot.py --project "$PROJECT" --scope "$SCOPE" --sprint "$IN_SPRINT"
          else
            python3 scripts/snapshot.py --project "$PROJECT" --scope "$SCOPE"
          fi

      - name: Generate AI briefing (best-effort; never blocks the snapshot)
        # Distills the fresh snapshot into a short 3-part exec brief via one
        # OpenAI-compatible chat-completion call (default: DeepSeek via
        # OpenRouter; point AI_MODEL/AI_BASE_URL at any other OpenAI-compatible
        # gateway, e.g. an Anthropic model, with no code change) and injects
        # the result as `ai_brief` into web/data/latest.json -- BEFORE both
        # publish steps below, so the Release asset, the Blob copy, and the
        # old web/ dashboard all pick it up. See scripts/ai_brief.mjs for the
        # full pipeline (distill -> prompt -> validate -> inject).
        #
        # continue-on-error + timeout-minutes are load-bearing, not
        # decorative: ai_brief.mjs is itself fail-soft (any error/timeout/
        # malformed response leaves latest.json byte-identical and the script
        # always exits 0), but that can't protect against `npm install`
        # hanging or failing before Node even runs. These two guarantee a
        # stuck or broken AI step can never stall or fail the job that both
        # downstream publish steps depend on.
        #
        # Requires the AI_API_KEY secret (+ AI_BASE_URL/AI_MODEL) to actually
        # generate anything -- if unset, this step logs a warning and skips
        # (mirrors the BLOB_READ_WRITE_TOKEN pattern below). No secret has
        # been added by this change; go-live is a separate step for whoever
        # owns the privacy-posture decision (see .env.example).
        # AI_SEND_REAL_NAMES / AI_SEND_SUMMARIES widen what leaves the
        # pipeline (see scripts/lib/distill-brief-input.mjs) and are expected
        # to stay unset by default.
        continue-on-error: true
        timeout-minutes: 3
        env:
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_SEND_REAL_NAMES: ${{ secrets.AI_SEND_REAL_NAMES }}
          AI_SEND_SUMMARIES: ${{ secrets.AI_SEND_SUMMARIES }}
        run: |
          if [ -z "${AI_API_KEY}" ]; then
            echo "::warning::AI_API_KEY not set -- skipping AI briefing (latest.json unchanged)."
            exit 0
          fi
          npm install --no-save openai@4
          node scripts/ai_brief.mjs

      - name: Publish snapshot to Vercel Blob (secret path)
        # The ONLY delivery path now — the public GitHub Release was dropped
        # (the old web/ Control Tower that read it is retired). Publishes
        # latest.json + today's dated history file under the unguessable
        # "<SNAPSHOT_SECRET>/" prefix (see scripts/blob_publish.mjs). A failure
        # here fails the job on purpose: with no other source, a silent failure
        # would strand the dashboard on stale data.
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          SNAPSHOT_SECRET: ${{ secrets.SNAPSHOT_SECRET }}
        run: |
          if [ -z "${BLOB_READ_WRITE_TOKEN}" ] || [ -z "${SNAPSHOT_SECRET}" ]; then
            echo "::error::BLOB_READ_WRITE_TOKEN or SNAPSHOT_SECRET not set — cannot publish the snapshot."
            exit 1
          fi
          npm install --no-save @vercel/blob@1
          node scripts/blob_publish.mjs
