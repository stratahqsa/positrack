name: Blob Republish

# Manually republish the CURRENT Release `latest.json` to Vercel Blob (the reports
# dashboard's data source) WITHOUT regenerating the snapshot. Fast (~40s). Use to
# force-refresh the dashboard from the latest Release, or to (re)seed the Blob after
# wiring it. The nightly Snapshot workflow publishes to Blob on its own; this is a
# lightweight out-of-band refresh that skips the ~285s effort sweep.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  republish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Download latest.json from the snapshot-latest Release
        run: |
          gh release download snapshot-latest --repo "$REPO" --pattern latest.json --dir . --clobber
          echo "downloaded latest.json ($(wc -c < latest.json) bytes)"

      - name: Publish latest.json to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          if [ -z "${BLOB_READ_WRITE_TOKEN}" ]; then
            echo "::error::BLOB_READ_WRITE_TOKEN not set — configure the secret first."
            exit 1
          fi
          npm install --no-save @vercel/blob@1
          node -e '
          const { put } = require("@vercel/blob");
          const fs = require("fs");
          put("latest.json", fs.readFileSync("latest.json"), {
            access: "public",
            addRandomSuffix: false,
            allowOverwrite: true,
            cacheControlMaxAge: 0,
            contentType: "application/json",
          }).then((r) => console.log("Published to Blob:", r.url))
            .catch((e) => { console.error("Blob publish failed:", e.message || e); process.exit(1); });
          '
