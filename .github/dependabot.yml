version: 2
updates:
  # Keep the MCP server's Python deps (FastMCP + its stack) patched.
  - package-ecosystem: "pip"
    directory: "/mcp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # Keep the GitHub Actions in our CI pinned to current, secure versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
